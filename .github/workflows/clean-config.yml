name: Clean OpenWrt Config

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.5
  CONFIG_FILE: configs/x86_64.config
  DIY_SCRIPT: diy-script.sh
  TZ: Asia/Shanghai

jobs:
  Clean:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/az "$AGENT_TOOLSDIRECTORY"
          sudo find /etc/apt/sources.list.d -type f ! -name 'ubuntu.sources' -delete
          removable_packages="$(dpkg-query -W -f='${binary:Package}\n' | grep -Ex 'azure-cli|google-cloud-cli|google-chrome-stable|firefox|powershell|clang(-tools|-tidy)?-(16|17)|llvm-(16|17)(-dev|-linker-tools|-runtime|-tools)?' || true)"
          [ -z "$removable_packages" ] || sudo -E apt-get -y purge $removable_packages
          sudo -E apt-get -y update
          sudo -E apt-get -y install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools qemu-utils rsync swig unzip zlib1g-dev file wget subversion
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Clone Source Code
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          cd ..
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      - name: Install Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration
        run: |
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE $OPENWRT_PATH/.config
          chmod +x $DIY_SCRIPT
          cd $OPENWRT_PATH
          $GITHUB_WORKSPACE/$DIY_SCRIPT

      - name: Clean and Minimize Config
        run: |
          cd $OPENWRT_PATH
          # 选项保全校验（前）：记录仓库 config 里所有显式 =y 的选项（含 INCLUDE 子选项）
          grep -E '^CONFIG_.*=y' "$GITHUB_WORKSPACE/$CONFIG_FILE" | sort > /tmp/before-opts.txt
          make defconfig
          # 选项保全校验（后）：找出 make defconfig 后不再生效的显式选项
          : > /tmp/removed-opts.txt
          while IFS= read -r opt; do
            grep -qxF "$opt" .config || printf '%s\n' "$opt" >> /tmp/removed-opts.txt
          done < /tmp/before-opts.txt
          if [ -s /tmp/removed-opts.txt ]; then
            echo "::warning::以下显式选项因上游变化已失效并被移除（请确认是否影响功能）："
            cat /tmp/removed-opts.txt
          else
            echo "选项保全校验通过：没有显式选项被移除。"
          fi
          ./scripts/diffconfig.sh > defconfig
          cp defconfig $GITHUB_WORKSPACE/$CONFIG_FILE

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $CONFIG_FILE
          # 组装提交信息：若有被移除的显式选项，一并写入，便于日后追溯
          {
            echo "Auto-clean config [skip ci]"
            if [ -s /tmp/removed-opts.txt ]; then
              echo ""
              echo "因上游变化被移除的显式选项："
              sed 's/^/  - /' /tmp/removed-opts.txt
            fi
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt || echo "No changes to commit"
          git push origin ${{ github.ref_name }}

      - name: Remove old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_RUNS: 3
        run: |
          set -euo pipefail
          workflow_file="$(basename "${GITHUB_WORKFLOW_REF%@*}")"
          gh api --paginate "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow_file/runs?per_page=100" --jq '.workflow_runs[] | [.created_at, .id, .status] | @tsv' |
            awk -F '\t' '$3 == "completed"' |
            sort -r -k1,1 |
            tail -n +"$((KEEP_RUNS + 1))" |
            while IFS=$'\t' read -r created_at run_id status; do
              [ -n "$run_id" ] || continue
              [ "$run_id" != "$GITHUB_RUN_ID" ] || continue
              echo "Deleting old workflow run $run_id from $created_at"
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/actions/runs/$run_id"
            done
